<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Signup | Hope Bridge Foundation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a class="brand" href="index.html">Hope Bridge Foundation</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <div class="nav-item dropdown">
                    <a class="dropbtn active" href="signup.html">Signup</a>
                    <div class="dropdown-content">
                        <a href="tutoring.html">Tutoring</a>
                        <a href="volunteer.html">Volunteer</a>
                        <a href="pricing.html">Pricing</a>
                    </div>
                </div>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <section>
            <h1>Volunteer Signup</h1>
            <p>Become a volunteer and support students through tutoring, event help, mentoring, or outreach. No prior experience is required.</p>
            <form class="form-grid" action="#" method="post">
                <input type="text" name="volunteerName" placeholder="Full Name" required>
                <input type="email" name="volunteerEmail" placeholder="Email Address" required>
                <input type="tel" name="volunteerPhone" placeholder="Phone Number" required>
                <select name="availability" required>
                    <option value="">Availability</option>
                    <option>Weekdays</option>
                    <option>Evenings</option>
                    <option>Weekends</option>
                    <option>Flexible</option>
                </select>
                <textarea name="experience" placeholder="Tell us about your experience and interests" required></textarea>
                <button type="submit">Join as a Volunteer</button>
            </form>
        </section>
    </main>
</body>
</html>
